name: Release Desktop App

# Creates a clean GitHub Release containing only the desktop installers.
# - Triggered by version tags (v0.1.0, v1.2.3, ...)
# - workflow_dispatch lets you test builds on any branch (artifacts only, no release)
# - Multi-platform matrix builds the bundled desktop app (backend + mcp_server sidecars)
# - A dedicated release job collects artifacts and publishes a single release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri v2 Linux prerequisites (webkit2gtk, appindicator, etc.)
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install backend dependencies (+ PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Builds the Python sidecars (backend + mcp_server) + Tauri desktop app.
      - name: Build backend sidecar + desktop app
        working-directory: frontend
        run: pnpm run desktop:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beacon-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            frontend/src-tauri/target/release/bundle/**/*.exe
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.AppImage
            frontend/src-tauri/target/release/bundle/**/*.deb
            frontend/src-tauri/target/release/bundle/**/*.rpm

  # Dedicated job: collects artifacts from all platforms and creates ONE clean release.
  # This ensures we attach only the installers (no source code in the main assets).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: beacon-*
          merge-multiple: true

      - name: Publish Desktop Installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Beacon ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: false
          body: |
            ## Beacon ${{ github.ref_name }}

            Desktop release with bundled backend + MCP server (no Python required).

            **Download the installer for your platform below.**

            - Windows: `.exe` (NSIS installer) or `.msi`
            - macOS: `.dmg`
            - Linux: `.AppImage`, `.deb`, or `.rpm`

            > ⚠️ The "Source code (zip)" and "Source code (tar.gz)" files below are **automatically generated by GitHub**.  
            > Use the platform-specific installer files for the full desktop experience.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
